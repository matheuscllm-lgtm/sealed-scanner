name: tests

# Public-repo CI: runs the test suite only. No secrets, no external paid
# services, standard ubuntu-latest runner (free for public repositories).
#
# The suite is fully offline: every adapter test (Firecrawl / Chrome / network
# paths) is driven from fixed HTML fixtures in tests/fixtures/, so nothing here
# needs a live credential or a real browser. No Firecrawl/ScraperAPI key, no
# patchright/Chromium download. Keep it that way — do not add steps that require
# secrets or network access.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
