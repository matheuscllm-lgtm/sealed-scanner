# TCG Sealed Arbitrage Scanner — configuração
#
# Brasil (Liga Pokémon) -> EUA (TCGPlayer). Produtos selados Pokémon TCG.
# Todas as premissas ficam aqui e são impressas no relatório — nunca escondidas.

currency:
  # Câmbio USD->BRL.
  #   mode: fetch  -> busca a cotação ao vivo na AwesomeAPI (bid USD-BRL) e
  #                   cai pra open.er-api.com em backup. Se ambas falharem,
  #                   usa o valor `usd_brl` abaixo como fallback.
  #   mode: manual -> ignora a rede e usa `usd_brl` diretamente.
  # O modo escolhido + a fonte usada aparecem no relatório do scan, então
  # o número sempre é auditável.
  mode: fetch
  usd_brl: 5.05

fees:
  # Taxas aplicadas sobre o PREÇO DE VENDA nos EUA (onde o produto é revendido).
  platform_fee_pct: 0.13      # marketplace de revenda (eBay/TCGPlayer)
  payment_fee_pct: 0.03       # processamento de pagamento
  fx_spread_pct: 0.02         # spread cambial na repatriação
  # Custos fixos por unidade, em BRL. Selado é volumoso/pesado — frete maior
  # que singles. Valores conservadores; ajuste conforme o 3PL real.
  international_shipping_brl: 90
  three_pl_brl: 25
  tax_buffer_pct: 0.00        # buffer de imposto/importação (0 = desligado)

frete:
  # Modelo de frete usado pelo pool_fill.
  #   flat       (operador 2026-05-28) — frete FIXO do lote inteiro, via
  #              consolidador/redirecionador. Não escala por vendedor:
  #              flat_single_seller_brl se comprar de 1 loja só,
  #              flat_multi_seller_brl se de várias. Frete é ADICIONAL ao
  #              budget de produtos (capital real = produtos + frete).
  #   per_seller (legado) — cada vendedor cobra frete por peso, amortizado
  #              sobre a qty. Usado se cada compra fosse enviada separada.
  modelo: flat
  #
  # Modelo FLAT final (operador 2026-05-28). Frete tem 2 pernas:
  #   frete = flat_base_pct × gasto_em_produtos  +  flat_per_seller_brl × (n_lojas − 1)
  #
  #   flat_base_pct      = perna internacional + 1ª loja (escala com o valor
  #                        do lote — consolidador → EUA).
  #   flat_per_seller_brl = perna doméstica por loja ADICIONAL (cada vendedor
  #                        Liga manda o pacote dele ao consolidador no Brasil).
  #
  # Calibração: reproduz os R$250/350 @ R$5.000 que o operador deu —
  #   1 loja:  5% × ~4762 (budget-inclusive)            ≈ R$238
  #   7 lojas: 5% × gasto + R$17×6                       ≈ R$340
  # Budget é TOTAL: produtos + frete <= budget (frete sai de dentro).
  flat_base_pct: 0.05            # 5% sobre o gasto em produtos
  flat_per_seller_brl: 17        # R$ por loja além da primeira
  #
  destino_cep: "01310-100"       # placeholder; relevante só no modelo per_seller
  #
  # --- abaixo: usado apenas no modelo per_seller (peso-based, legado) ---
  # Tabela de frete por faixa de peso. Calibrável via cotação Correios real.
  estimado_brl:
    until_500g: 22       # 1 pack, 2-3 packs sleeveless, blister
    until_1kg:  35       # 1 bundle, multiple packs, theme deck
    until_2kg:  45       # 1 ETB ou 1 booster box pequeno
    until_3kg:  60       # bundle + extras, ou 2 ETBs
  fallback_brl: 50       # usado se peso > 3kg ou desconhecido
  #
  # Pesos default por product_type (per_seller). compute_shipping faz lookup
  # aqui; override por SKU via "peso_g: N" no sku_registry.yaml.
  weights_g_by_type:
    Booster Pack:        40
    Sleeved Booster:     40
    Booster Bundle:      500
    Elite Trainer Box:   1500
    Booster Box:         1200
    Collection Box:      1100
    Premium Collection:  800
    Tin:                 300
    Blister:             80
    Blister Pack:        80
    Battle Deck:         100
    Theme Deck:          100
    Kit:                 200

filters:
  # Filtros mínimos. Antes 150 (era p/ boxes). Baixado pra 25 com a chegada
  # dos booster packs (~R$30-100). Items abaixo de 25 quase sempre são parts
  # ou itens incompletos. O fee model agora usa bulk_qty por SKU pra
  # amortizar custos fixos em compras em lote.
  min_brazil_price_brl: 25

deal_criteria:
  # "Margem total" do negócio = (preço_US − preço_BR) / preço_BR
  # = lucro sobre o capital de compra, ANTES das taxas. É o ÚNICO filtro.
  min_total_margin_pct: 0.40   # alvo p/ GREEN: produto com >= 40% de margem total
  review_floor_pct: 0.30       # entre 30% e 40% -> YELLOW (revisar); abaixo -> rejeitado
  # Classificação é SÓ por margem bruta (operador 2026-06-02): sem saber o frete
  # real e o tamanho do lote por remessa, a margem líquida é um número fabricado.
  # Por isso NÃO há guarda-chuva de ROI líquido — a líquida é calculada e exibida
  # apenas como alerta informativo, nunca define GREEN/YELLOW/RED.
  # Equivalências (mesma margem, denominador diferente):
  #   40% de margem total    <=>  ~29% mais barato que os EUA
  #   30% mais barato que US <=>  ~43% de margem total
  #   35% mais barato que US <=>  ~54% de margem total

sources:
  brazil:
    - Liga Pokémon
  usa:
    - TCGPlayer

liga:
  # Usado por --source liga (liga_adapter.py). A Liga bloqueia IP de
  # datacenter no Cloudflare; o adapter tem dois modos para furar isso:
  #
  #   mode=local        (DEFAULT) Usa Chrome real via patchright. Roda
  #                     do seu PC (IP residencial). SEM CUSTO. Requer
  #                     Google Chrome instalado e patchright no Python.
  #                     pip install patchright
  #
  #   mode=scraperapi   Roteia tudo via api.scraperapi.com (proxy
  #                     residencial). Usar quando rodar em servidor
  #                     (IP datacenter). Liga é "protected domain" no
  #                     ScraperAPI → premium=true → ~25-50 credits por
  #                     render JS. Free tier 1000 req/mês = ~1 scan
  #                     completo no máximo. Configure SCRAPERAPI_KEY
  #                     no .env ou env var.
  mode: local
  # headless DEVE ser false pra Liga: o Cloudflare da Liga ("Um momento…")
  # NÃO clareia em headless (validado 2026-05-29: headless=0 produtos em todas
  # as categorias; headful=48 produtos na categ 27). Bypass CF exige Chrome
  # com janela. Roda do PC do operador (sessão desktop), não em servidor.
  headless: false           # mode=local: false = Chrome visível (necessário p/ CF)
  # scraperapi_key: ""      # NÃO commitar; prefira .env / env var
  #
  # Categorias do site (categ=N em ?view=cards/search):
  #   10 Caixas de Boosters          25 Blisters
  #   14 Pacotes / Fat Packs         26 Decks Selados
  #   21 Boosters Avulsos            27 Coleção Treinador Avançado
  #                                  28 Box Colecionável
  #                                  38 Kits
  categorias: [10, 14, 21, 25, 26, 27, 28, 38]
  # Idiomas mantidos (do prefixo do nome do produto: ING, PT-BR, JAP, ...).
  # EN é o foco do scanner; adicione PT-BR/JAP pra contexto doméstico.
  keep_languages: ["EN"]
  # Teto de produtos por categoria. Mode local: sem custo, pode subir
  # bem. Mode scraperapi: cada produto = ~25-50 credits, dose com cuidado.
  max_products_per_category: 30
  delay_seconds: 1.0

amazon:
  # Usado por --source amazon (amazon_adapter.py). Faz uma busca textual no
  # amazon.com.br/s?k=<query> por SKU do registry. Sem CF, sem auth.
  results_per_sku: 6
  delay_seconds: 1.5

olx:
  # Usado por --source olx (olx_adapter.py). Lê __NEXT_DATA__ embutido na
  # página de busca da OLX. Sem CF, sem auth.
  # Inventário OLX é esparso por SKU; buscamos por tipo de produto (booster
  # box / elite trainer box / booster bundle / ...) e deixamos o matcher
  # filtrar contra o registry.
  results_per_query: 50
  delay_seconds: 1.5

scope:
  include:
    - Booster Box
    - Elite Trainer Box
    - Booster Bundle
    - Collection Box
    - Premium Collection
    - Tin
    - Sleeved Booster
    - Blister Pack
  exclude:
    - Raw Singles
    - Graded Cards
    - Opened Products
    - Damaged Products
