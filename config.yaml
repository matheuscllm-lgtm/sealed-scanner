# TCG Sealed Arbitrage Scanner — configuração
#
# Brasil (Liga Pokémon) -> EUA (TCGPlayer). Produtos selados Pokémon TCG.
# Todas as premissas ficam aqui e são impressas no relatório — nunca escondidas.

currency:
  # Câmbio USD->BRL.
  #   mode: fetch  -> busca a cotação ao vivo na AwesomeAPI (bid USD-BRL) e
  #                   cai pra open.er-api.com em backup. Se ambas falharem,
  #                   usa o valor `usd_brl` abaixo como fallback.
  #   mode: manual -> ignora a rede e usa `usd_brl` diretamente.
  # O modo escolhido + a fonte usada aparecem no relatório do scan, então
  # o número sempre é auditável.
  mode: fetch
  usd_brl: 5.05

# Custos operacionais (taxas de marketplace, frete internacional, 3PL, imposto)
# e o modelo de frete do pool: REMOVIDOS. Decisão do operador — o scanner
# classifica SÓ por margem bruta e NÃO calcula nem exibe margem líquida. Frete,
# cartão, IOF e qualquer custo são calculados POR FORA, na mão. (README invariante #1)

filters:
  # Filtros mínimos. Antes 150 (era p/ boxes). Baixado pra 25 com a chegada
  # dos booster packs (~R$30-100). Items abaixo de 25 quase sempre são parts
  # ou itens incompletos.
  min_brazil_price_brl: 25

deal_criteria:
  # "Margem total" do negócio = (preço_US − preço_BR) / preço_BR
  # = só a diferença de preço entre os dois produtos, SEM nenhuma taxa embutida.
  # É o ÚNICO filtro.
  #
  # Regra única do operador (2026-06-06, vale pra TODOS os scanners de TCG dele):
  # margem bruta de 30%. Frete, cartão, IOF e qualquer outra taxa são calculados
  # POR FORA, na mão. O scanner só compara preço com preço.
  min_total_margin_pct: 0.30   # >= 30% de margem bruta -> GREEN. Abaixo -> RED.
  # Teto de plausibilidade. Margem bruta ALTA demais p/ selado quase sempre é
  # artefato de match, não oportunidade: um acessório barato (fichário/álbum
  # avulso ~R$230) casa o SKU selado caro ("151 Binder Collection", US$240) e
  # gera 432% fantasma. Acima deste teto, um match HIGH NÃO vira GREEN: cai em
  # RED com motivo `margem_anomala` (auditável) p/ verificação manual, em vez de
  # falso-GREEN. Vazio/ausente = sem teto (comportamento antigo).
  review_above_margin_pct: 2.0   # > 200% de margem bruta -> RED (margem_anomala)
  # Classificação SÓ por margem bruta. YELLOW é EXCLUSIVAMENTE match ambíguo
  # (1 anúncio casa com 2+ SKUs) — nunca por faixa de margem. O scanner NÃO
  # calcula nem exibe margem líquida; custos operacionais ficam fora do scanner.
  # Equivalências (mesma margem, denominador diferente):
  #   30% de margem bruta    <=>  ~23% mais barato que os EUA
  #   30% mais barato que US <=>  ~43% de margem bruta

sources:
  brazil:
    - Liga Pokémon
  usa:
    - TCGPlayer

liga:
  # Usado por --source liga (liga_adapter.py). A Liga bloqueia IP de
  # datacenter no Cloudflare; o adapter tem dois modos para furar isso:
  #
  #   mode=local        (DEFAULT) Usa Chrome real via patchright. Roda
  #                     do seu PC (IP residencial). SEM CUSTO. Requer
  #                     Google Chrome instalado e patchright no Python.
  #                     pip install patchright
  #
  #   mode=scraperapi   Roteia tudo via api.scraperapi.com (proxy
  #                     residencial). Usar quando rodar em servidor
  #                     (IP datacenter). Liga é "protected domain" no
  #                     ScraperAPI → premium=true → ~25-50 credits por
  #                     render JS. Free tier 1000 req/mês = ~1 scan
  #                     completo no máximo. Configure SCRAPERAPI_KEY
  #                     no .env ou env var.
  mode: local
  # headless DEVE ser false pra Liga: o Cloudflare da Liga ("Um momento…")
  # NÃO clareia em headless (validado 2026-05-29: headless=0 produtos em todas
  # as categorias; headful=48 produtos na categ 27). Bypass CF exige Chrome
  # com janela. Roda do PC do operador (sessão desktop), não em servidor.
  headless: false           # mode=local: false = Chrome visível (necessário p/ CF)
  # scraperapi_key: ""      # NÃO commitar; prefira .env / env var
  #
  # Categorias do site (categ=N em ?view=cards/search):
  #   10 Caixas de Boosters          25 Blisters
  #   14 Pacotes / Fat Packs         26 Decks Selados
  #   21 Boosters Avulsos            27 Coleção Treinador Avançado
  #                                  28 Box Colecionável
  #                                  38 Kits
  categorias: [10, 14, 21, 25, 26, 27, 28, 38]
  # Idiomas mantidos (do prefixo do nome do produto: ING, PT-BR, JAP, ...).
  # EN é o foco do scanner; adicione PT-BR/JAP pra contexto doméstico.
  keep_languages: ["EN"]
  # Teto de produtos por categoria. Mode local: sem custo, pode subir
  # bem. Mode scraperapi: cada produto = ~25-50 credits, dose com cuidado.
  max_products_per_category: 30
  delay_seconds: 1.0

amazon:
  # Usado por --source amazon (amazon_adapter.py). Faz uma busca textual no
  # amazon.com.br/s?k=<query> por SKU do registry. A Amazon BR serve 503
  # anti-bot intermitente ao urllib puro (~50% medido 2026-06-05).
  results_per_sku: 6
  # Bump 1.5 -> 2.5 (+ jitter no adapter) pra aliviar pressão de request e
  # reduzir 503 anti-bot da Amazon BR. Ver docs/HANDOFF-amazon-adapter-2026-06-05.md.
  delay_seconds: 2.5
  # Fallback Firecrawl (render + proxy residencial) p/ os SKUs que o urllib+retry
  # não consegue (503 persistente). Liga por padrão SE FIRECRAWL_API_KEY existir
  # no ambiente; só dispara no esgotamento do urllib → custo de créditos baixo
  # (~13% dos SKUs). Desligue (false) p/ rodar 100% sem créditos.
  fallback_firecrawl: true
  firecrawl_proxy: stealth   # basic | stealth | enhanced | auto (anti-bot da Amazon pede stealth)

olx:
  # Usado por --source olx (olx_adapter.py). Lê __NEXT_DATA__ embutido na
  # página de busca da OLX.
  #
  # ATENÇÃO: a OLX TEM Cloudflare WAF (managed-rule / IP-reputation block) —
  # NÃO é "sem CF". Não é o Turnstile da Liga (sem captcha pra clicar); é
  # escalação por reputação de IP: a 1ª request num IP frio às vezes passa,
  # depois o WAF flaga o IP e mantém o block. Por isso há dois modos de
  # transporte:
  #
  #   mode=urllib     (DEFAULT) GET direto + retry/backoff/jitter. Recupera a
  #                   janela de IP frio e não aborta no 1º block, mas NÃO
  #                   entrega OLX cheia de forma confiável quando o IP já está
  #                   flagado. Sem custo.
  #
  #   mode=firecrawl  Roteia a busca via Firecrawl (render + proxy stealth),
  #                   fura o WAF e retorna o HTML renderizado pro MESMO parser.
  #                   É o que faz a OLX entregar inventário de forma repetível.
  #                   Usa FIRECRAWL_API_KEY (env/.env, já setada no ambiente).
  mode: urllib
  # firecrawl_proxy: stealth      # proxy do Firecrawl (stealth fura o WAF da OLX)
  # firecrawl_wait_ms: 6000       # ms de espera pós-render antes de capturar o HTML
  # firecrawl_api_key: ""         # NÃO commitar; prefira FIRECRAWL_API_KEY / .env
  #
  # Inventário OLX é esparso por SKU; buscamos por tipo de produto (booster
  # box / elite trainer box / booster bundle / ...) e deixamos o matcher
  # filtrar contra o registry.
  results_per_query: 50
  delay_seconds: 1.5

mercadolivre:
  # Usado por --source mercadolivre (mercadolivre_adapter.py). Parser DOM/CSS
  # (o ML NÃO expõe __NEXT_DATA__). 4ª fonte BR; inventário grande de selado.
  #
  # ML tem anti-bot PRÓPRIO (account-verification / suspicious-traffic), NÃO o
  # Cloudflare da OLX. urllib puro NÃO passa → FIRECRAWL-FIRST. O device-check
  # (challenge JS) precisa de waitFor ~12-15s pra clarear (6s, o número da OLX,
  # cai no account-verification). Custo: stealth é o tier caro do Firecrawl →
  # queries amplas por tipo (~8), 1 página cada; matcher filtra o resto.
  mode: firecrawl            # firecrawl (default) | urllib (não rende hoje)
  firecrawl_proxy: stealth
  firecrawl_wait_ms: 14000   # device-check do ML; NÃO copiar os 6000 da OLX
  results_per_query: 50
  delay_seconds: 1.5
  # firecrawl_api_key: ""    # NÃO commitar; prefira FIRECRAWL_API_KEY / .env
  #
  # Estratégia de busca:
  #   stores = busca "store_query" DENTRO de cada loja confiável (RECOMENDADO).
  #            URL lista.ml.com.br/loja/{slug}/{query} devolve só itens da loja,
  #            no parser padrão (validado 2026-06-07: loja/asmodee/pokemon = 100%
  #            Asmodee, recall maior que a busca ampla). Vale p/ LOJA OFICIAL.
  #   type   = 8 buscas amplas por tipo no ML inteiro (+ seller_allowlist filtra).
  search_mode: stores
  store_query: pokemon       # termo buscado dentro de cada loja (amplo; o matcher filtra)
  stores:                    # slugs de loja oficial (lista.ml.com.br/loja/{slug})
    - asmodee                # validado ao vivo (escopo 100%); blisters/Mega Evolution
    - brink-center           # Galápagos: boosters/displays/blisters Chaos Rising
    - baby-world             # ETBs Perfect Order / Chaos Rising
    - pokemon                # Loja Oficial Pokémon — maior fonte EN do ML
    - copag                  # distribuidor oficial; importados EN além do PT-BR
  # Lojas NÃO-oficiais (FLOR IMPORTS, BTPRIME, WBSHOP, THE_COLLECTOR_BR) não têm
  # /loja/{slug} — precisam de filtro por seller_id (evolução futura). E as de
  # decks/cartas douradas (FLOR/LEITURA/Lehadry/WBSHOP) ficam fora do escopo
  # selado-inglês de qualquer jeito (o matcher rejeita).
  #
  # Foco em vendedores confiáveis (OPCIONAL). VAZIO = sem filtro (todo o ML).
  # Quando preenchido, mantém só anúncios cujo vendedor casa (substring, sem
  # acento/caixa) algum item — corta o ruído de vendedor genérico ("Mercado
  # Livre" anônimo). Medido no probe ao vivo 2026-06-07: estas lojas carregam
  # selado INGLÊS limpo ("Inglês"/"-en"/"Lacrado") e dominam o inventário do ML;
  # a Loja Oficial Pokémon e a COPAG também vendem inglês explícito (não só PT-BR).
  # NÃO substitui o matcher/escopo — só estreita a quem vende. Descomente p/ ligar.
  #
  # Curadoria do operador por volume de vendas (2026-06-07). Termo = substring do
  # vendedor (sem acento/caixa). ATENÇÃO: ativar a lista faz o scan manter SÓ
  # estes vendedores (derruba o resto, inclusive vendedor genérico).
  seller_allowlist:
    # --- selado INGLÊS no escopo (boxes / ETB / bundle / blister) -----------
    - asmodee          # distribuidor oficial TCG; blisters + Mega Evolution
    - brink center     # Galápagos: boosters/displays/blisters Chaos Rising
    - galapagos        #   (mesma linha aparece como "GALAPAGOS" direto)
    - baby world       # ETBs Perfect Order / Chaos Rising
    - btprime          # ETBs e selados originais
    - collector        # THE_COLLECTOR_BR: boosters/bundles Phantasmal Flames
  # FORA do escopo selado-inglês (decks, cartas douradas/single, lotes): o
  # matcher REJEITA o que vendem (não há SKU de deck/single no registry). Só
  # rende se AMPLIARMOS o escopo — descomente junto com a expansão:
  #   - flor imports   # kits de decks ("Kit 3 Decks 165 Cartas")
  #   - leitura        # decks de batalha (Dragapult ex League)
  #   - lehadry        # cartas douradas/gold (single/novelty)
  #   - wbshop         # kits de cartas douradas
  # Top fontes EN MEDIDAS no probe (recomendado incluir) — descomente p/ ligar:
  #   - pokémon        # Loja Oficial Pokémon — 37 matches EN (a MAIOR fonte)
  #   - copag          # distribuidor oficial — também lista importados EN

scope:
  include:
    - Booster Box
    - Elite Trainer Box
    - Booster Bundle
    - Collection Box
    - Premium Collection
    - Tin
    - Sleeved Booster
    - Blister Pack
  exclude:
    - Raw Singles
    - Graded Cards
    - Opened Products
    - Damaged Products
