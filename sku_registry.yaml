# Registry curado de SKUs de produtos selados Pokémon TCG.
#
# Para selado, o catálogo é pequeno e enumerável — algumas centenas de SKUs
# no total — diferente dos ~16k singles. Por isso o "matcher" é uma busca
# determinística contra este registry curado, não um fuzzy matcher.
#
# Cada SKU é casado contra um anúncio brasileiro assim:
#   - set_terms:    pelo menos UM precisa aparecer no título normalizado
#   - type_terms:   pelo menos UM precisa aparecer
#   - exclude_terms: se QUALQUER UM aparecer, o SKU é descartado
# Normalização: minúsculas, acentos removidos ("Inglês" -> "ingles").
#
# match_confidence:
#   HIGH   -> exatamente 1 SKU casou
#   REVIEW -> 2+ SKUs casaram (ambíguo, ex.: "ETB Prismatic" sem dizer se é
#             a versão Pokémon Center)
#   NONE   -> 0 SKUs casaram
#
# tcgplayer_group_id / tcgplayer_product_id apontam o produto canônico em
# tcgcsv.com (espelho da API do TCGPlayer) para puxar o preço de referência
# US via sealed/build_us_reference.py. Pokémon = categoryId 3.

skus:
  - id: ssp-booster-box-en
    name: Surging Sparks Booster Box (English)
    product_type: Booster Box
    set: Surging Sparks
    set_code: SSP
    language: EN
    pack_count: 36
    tcgplayer_group_id: 23651
    tcgplayer_product_id: 565606
    match:
      set_terms: [surging sparks]
      type_terms: [booster box, caixa de booster, display de booster, booster display]
      exclude_terms: [japones, japonesa, japanese, portugues, portuguesa, portuguese, pt br, ptbr, copag, chines, chinesa, chinese, coreano, coreana, korean, espanhol, espanhola, spanish, frances, francesa, french, alemao, alema, german, italiano, italiana, italian, acrylic, acrilico, magnetic, protector, protetor, storage, case for, capa para, etb, elite trainer, bundle, blister, tin, lata]

